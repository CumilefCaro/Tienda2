name: Deploy Backend Despachos

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir imagen Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest "proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"

      - name: Publicar imagen en Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest
            docker stop back-despachos || true
            docker rm back-despachos || true
            docker run -d \
              --name back-despachos \
              --restart always \
              -p 8081:8081 \
              --env-file /home/ec2-user/.env \
              ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest